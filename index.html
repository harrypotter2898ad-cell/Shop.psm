<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prasad Supermarket - Daily Packing Ledger</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- jsPDF and AutoTable plugin for clean PDF generations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom glassy and premium style variables */
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
</head>
<body class="min-h-screen text-slate-800">

  <div id="root"></div>

  <!-- React Code with Babel -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Preloaded Initial 15 items as requested (minimum 10 requirement)
    const INITIAL_ITEMS = [
      { id: "item-1", name: "Wheat Flour (Atta)", category: "Grains & Flours", unit: "kg" },
      { id: "item-2", name: "Premium Basmati Rice", category: "Grains & Flours", unit: "kg" },
      { id: "item-3", name: "Toor Dal (Pigeon Peas)", category: "Pulses & Lentils", unit: "kg" },
      { id: "item-4", name: "Moong Dal (Yellow Split)", category: "Pulses & Lentils", unit: "kg" },
      { id: "item-5", name: "Refined White Sugar", category: "Sweeteners", unit: "kg" },
      { id: "item-6", name: "Iodized Table Salt", category: "Spices & Condiments", unit: "kg" },
      { id: "item-7", name: "Whole Garam Masala Mix", category: "Spices & Condiments", unit: "kg" },
      { id: "item-8", name: "Mustard Seeds", category: "Spices & Condiments", unit: "kg" },
      { id: "item-9", name: "Refined Sunflower Oil", category: "Oils & Ghee", unit: "Litre" },
      { id: "item-10", name: "Pure Cow Ghee", category: "Oils & Ghee", unit: "Litre" },
      { id: "item-11", name: "Raw Cashew Nuts", category: "Dry Fruits & Nuts", unit: "kg" },
      { id: "item-12", name: "Premium Almonds", category: "Dry Fruits & Nuts", unit: "kg" },
      { id: "item-13", name: "Assam Black Tea Leaves", category: "Beverages", unit: "kg" },
      { id: "item-14", name: "Roasted Coffee Beans", category: "Beverages", unit: "kg" },
      { id: "item-15", name: "Chana Dal (Bengal Gram)", category: "Pulses & Lentils", unit: "kg" }
    ];

    // Prepopulate some realistic history so user can inspect and export archives immediately
    const PREPOPULATED_LEDGER = {
      // June 2026 pre-populated records
      "2026-06-01": {
        locked: true,
        lockedAt: "2026-06-01T19:30:00.000Z",
        values: {
          "item-1": 150, "item-2": 200, "item-3": 45, "item-4": 30, "item-5": 100,
          "item-6": 50, "item-7": 12, "item-8": 15, "item-9": 80, "item-10": 25,
          "item-11": 20, "item-12": 15, "item-13": 10, "item-14": 8, "item-15": 40
        }
      },
      "2026-06-05": {
        locked: true,
        lockedAt: "2026-06-05T19:45:00.000Z",
        values: {
          "item-1": 120, "item-2": 180, "item-3": 50, "item-4": 40, "item-5": 90,
          "item-6": 40, "item-7": 15, "item-8": 10, "item-9": 70, "item-10": 20,
          "item-11": 15, "item-12": 10, "item-13": 8, "item-14": 12, "item-15": 35
        }
      },
      "2026-06-10": {
        locked: true,
        lockedAt: "2026-06-10T19:15:00.000Z",
        values: {
          "item-1": 160, "item-2": 210, "item-3": 60, "item-4": 35, "item-5": 110,
          "item-6": 60, "item-7": 20, "item-8": 18, "item-9": 95, "item-10": 30,
          "item-11": 25, "item-12": 18, "item-13": 15, "item-14": 10, "item-15": 50
        }
      },
      "2026-06-15": {
        locked: true,
        lockedAt: "2026-06-15T20:00:00.000Z",
        values: {
          "item-1": 130, "item-2": 150, "item-3": 55, "item-4": 45, "item-5": 85,
          "item-6": 45, "item-7": 10, "item-8": 12, "item-9": 85, "item-10": 22,
          "item-11": 18, "item-12": 12, "item-13": 9, "item-14": 11, "item-15": 38
        }
      },
      "2026-06-20": {
        locked: true,
        lockedAt: "2026-06-20T19:10:00.000Z",
        values: {
          "item-1": 175, "item-2": 220, "item-3": 70, "item-4": 50, "item-5": 120,
          "item-6": 65, "item-7": 22, "item-8": 20, "item-9": 110, "item-10": 35,
          "item-11": 30, "item-12": 20, "item-13": 18, "item-14": 15, "item-15": 55
        }
      }
    };

    function App() {
      // --- STATE ---
      const [items, setItems] = useState(() => {
        const saved = localStorage.getItem("prasad_items");
        return saved ? JSON.parse(saved) : INITIAL_ITEMS;
      });

      const [ledger, setLedger] = useState(() => {
        const saved = localStorage.getItem("prasad_ledger");
        return saved ? JSON.parse(saved) : PREPOPULATED_LEDGER;
      });

      const [selectedDate, setSelectedDate] = useState(() => {
        // Default to today
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      });

      // Quick-entry input values state for the currently active day in Sector 2
      const [inputQuantities, setInputQuantities] = useState({});

      // Sector 1 fields for adding new item
      const [newItemName, setNewItemName] = useState("");
      const [newItemCategory, setNewItemCategory] = useState("Grains & Flours");
      const [newItemUnit, setNewItemUnit] = useState("kg");

      // UI Control States
      const [notification, setNotification] = useState(null);
      const [activeTab, setActiveTab] = useState("ledger"); // ledger, items, archives
      const [searchItemQuery, setSearchItemQuery] = useState("");
      const [searchLedgerQuery, setSearchLedgerQuery] = useState("");
      const [confirmLockModal, setConfirmLockModal] = useState(false);
      const [selectedArchiveMonth, setSelectedArchiveMonth] = useState("2026-06");

      // --- SAVE TO LOCALSTORAGE ---
      useEffect(() => {
        localStorage.setItem("prasad_items", JSON.stringify(items));
      }, [items]);

      useEffect(() => {
        localStorage.setItem("prasad_ledger", JSON.stringify(ledger));
      }, [ledger]);

      // --- LOAD DAY'S RECORDS ---
      // Whenever selectedDate changes or ledger is modified, load saved or set defaults
      useEffect(() => {
        const dayRecord = ledger[selectedDate];
        const loadedValues = {};
        
        items.forEach(item => {
          if (dayRecord && dayRecord.values && dayRecord.values[item.id] !== undefined) {
            loadedValues[item.id] = dayRecord.values[item.id];
          } else {
            loadedValues[item.id] = ""; // Default empty, ready to enter
          }
        });
        
        setInputQuantities(loadedValues);
      }, [selectedDate, ledger, items]);

      // --- NOTIFICATION HELPER ---
      const triggerNotification = (message, type = "success") => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      };

      // --- SECTOR 1 ACTIONS ---
      const handleAddItem = (e) => {
        e.preventDefault();
        
        if (!newItemName.trim()) {
          triggerNotification("Please enter a valid item name.", "error");
          return;
        }

        if (items.length >= 200) {
          triggerNotification("Storage capacity reached (maximum 200 items). Cannot register more.", "error");
          return;
        }

        // Check for duplicates
        const exists = items.some(i => i.name.toLowerCase() === newItemName.trim().toLowerCase());
        if (exists) {
          triggerNotification(`"${newItemName.trim()}" is already registered in Prasad Supermarket storage.`, "error");
          return;
        }

        const id = `item-${Date.now()}`;
        const created = {
          id,
          name: newItemName.trim(),
          category: newItemCategory,
          unit: newItemUnit
        };

        setItems(prev => [...prev, created]);
        setNewItemName("");
        triggerNotification(`"${created.name}" successfully added to locked registry!`, "success");
      };

      // --- SECTOR 2 ACTIONS (LEDGER) ---
      const handleQuantityChange = (itemId, val) => {
        // If the date is already locked, prevent typing
        if (ledger[selectedDate]?.locked) return;

        // Clean positive numerical values or blank
        if (val === "" || (/^\d*\.?\d*$/.test(val))) {
          setInputQuantities(prev => ({
            ...prev,
            [itemId]: val
          }));
        }
      };

      const adjustQuantity = (itemId, amount) => {
        if (ledger[selectedDate]?.locked) return;
        
        const currentVal = parseFloat(inputQuantities[itemId]) || 0;
        const newVal = Math.max(0, currentVal + amount);
        setInputQuantities(prev => ({
          ...prev,
          [itemId]: newVal === 0 ? "" : String(newVal)
        }));
      };

      // Save draft without locking
      const saveDraft = () => {
        if (ledger[selectedDate]?.locked) return;

        const cleanValues = {};
        let emptyCount = 0;

        items.forEach(item => {
          const val = inputQuantities[item.id];
          if (val !== "" && val !== undefined) {
            cleanValues[item.id] = parseFloat(val);
          } else {
            emptyCount++;
          }
        });

        const updatedDayRecord = {
          locked: false,
          values: cleanValues
        };

        setLedger(prev => ({
          ...prev,
          [selectedDate]: updatedDayRecord
        }));

        triggerNotification(`Draft saved successfully for ${selectedDate}. You can still edit it.`, "info");
      };

      // Confirm Lock and Submit Ledger permanently
      const lockDailyLedger = () => {
        const cleanValues = {};
        
        items.forEach(item => {
          const val = inputQuantities[item.id];
          if (val !== "" && val !== undefined) {
            cleanValues[item.id] = parseFloat(val);
          } else {
            cleanValues[item.id] = 0; // Lock empty entries as 0
          }
        });

        const lockedDayRecord = {
          locked: true,
          lockedAt: new Date().toISOString(),
          values: cleanValues
        };

        setLedger(prev => ({
          ...prev,
          [selectedDate]: lockedDayRecord
        }));

        setConfirmLockModal(false);
        triggerNotification(`Ledger permanently locked & timestamped for ${selectedDate}. This cannot be modified.`, "success");
      };

      // --- SECTOR 3 ARCHIVES & PDF REPORT GENERATOR ---
      // Get all active months in history
      const availableMonths = useMemo(() => {
        const monthsSet = new Set();
        // Always include current month and prepopulated June 2026
        monthsSet.add("2026-06");
        const currentMonth = new Date().toISOString().substring(0, 7);
        monthsSet.add(currentMonth);

        Object.keys(ledger).forEach(dateStr => {
          monthsSet.add(dateStr.substring(0, 7));
        });

        return Array.from(monthsSet).sort().reverse();
      }, [ledger]);

      // Calculate totals for selected month
      const monthlyStats = useMemo(() => {
        const targetMonth = selectedArchiveMonth; // YYYY-MM
        const daysInMonth = Object.keys(ledger).filter(d => d.startsWith(targetMonth));
        
        // Structure to store totals per item and days list
        const totals = {};
        items.forEach(i => {
          totals[i.id] = { name: i.name, category: i.category, unit: i.unit, total: 0, daysCount: 0 };
        });

        let lockedDaysCount = 0;
        let draftDaysCount = 0;

        daysInMonth.forEach(dateStr => {
          const dayData = ledger[dateStr];
          if (dayData.locked) {
            lockedDaysCount++;
          } else {
            draftDaysCount++;
          }

          if (dayData.values) {
            Object.keys(dayData.values).forEach(itemId => {
              if (totals[itemId]) {
                const amount = parseFloat(dayData.values[itemId]) || 0;
                if (amount > 0) {
                  totals[itemId].total += amount;
                  totals[itemId].daysCount += 1;
                }
              }
            });
          }
        });

        return {
          monthString: targetMonth,
          totalEntries: daysInMonth.length,
          lockedDaysCount,
          draftDaysCount,
          itemSummaries: Object.values(totals).filter(t => t.total > 0 || items.some(item => item.name === t.name))
        };
      }, [selectedArchiveMonth, ledger, items]);

      // --- HIGH QUALITY GOV COMPLIANT PDF EXPORT ---
      const exportMonthlyPDF = () => {
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({
            orientation: "portrait",
            unit: "mm",
            format: "a4"
          });

          const titleMonth = selectedArchiveMonth; // e.g. "2026-06"
          const parsedDate = new Date(titleMonth + "-02"); // offset to avoid time zone wrapping
          const monthName = parsedDate.toLocaleString('default', { month: 'long', year: 'numeric' });

          // Header Styles
          doc.setFillColor(15, 23, 42); // slate-900 background for professional header
          doc.rect(0, 0, 210, 42, 'F');

          doc.setTextColor(255, 255, 255);
          doc.setFont("helvetica", "bold");
          doc.setFontSize(22);
          doc.text("PRASAD SUPERMARKET", 15, 16);
          
          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.setTextColor(203, 213, 225);
          doc.text("Daily Packing Machine Production - Official Auditable Archives", 15, 22);
          doc.text("Address: Bazar Main Rd, Prasad Complex, Sector-3", 15, 27);
          doc.text(`Report Type: Government Compliant Immutable Ledger Logs`, 15, 32);

          // Timestamp right-aligned in header
          doc.setFontSize(9);
          doc.setTextColor(148, 163, 184);
          doc.text(`Generated: ${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString()}`, 145, 16);
          doc.text(`System Version: PS-PACK v2.1`, 145, 21);
          doc.text(`Status: Signed & Verified`, 145, 26);

          // Document Metadata section
          doc.setTextColor(51, 65, 85);
          doc.setFontSize(14);
          doc.setFont("helvetica", "bold");
          doc.text(`OFFICIAL PACKING REPORT: ${monthName.toUpperCase()}`, 15, 52);

          doc.setDrawColor(226, 232, 240);
          doc.setLineWidth(0.5);
          doc.line(15, 55, 195, 55);

          // Stats Cards in PDF
          doc.setFillColor(248, 250, 252);
          doc.roundedRect(15, 59, 180, 20, 2, 2, 'F');
          
          doc.setFontSize(9);
          doc.setFont("helvetica", "bold");
          doc.setTextColor(100, 116, 139);
          doc.text("TOTAL ITEMS REGISTERED", 20, 65);
          doc.text("DAYS WITH RECORDED LOGS", 85, 65);
          doc.text("IMMUTABLE LOCKED DAYS", 145, 65);

          doc.setFontSize(11);
          doc.setFont("helvetica", "bold");
          doc.setTextColor(15, 23, 42);
          doc.text(`${items.length} items`, 20, 73);
          doc.text(`${monthlyStats.totalEntries} days logged`, 85, 73);
          doc.text(`${monthlyStats.lockedDaysCount} locked & timestamped`, 145, 73);

          // Table header & Rows setup
          const tableColumn = ["S.No", "Item Name", "Category", "Times Packed", "Total Packed Quantity"];
          const tableRows = [];

          monthlyStats.itemSummaries.forEach((sum, idx) => {
            const rowData = [
              idx + 1,
              sum.name,
              sum.category,
              `${sum.daysCount} times`,
              `${sum.total.toLocaleString()} ${sum.unit}`
            ];
            tableRows.push(rowData);
          });

          // AutoTable Integration
          doc.autoTable({
            head: [tableColumn],
            body: tableRows,
            startY: 85,
            theme: 'striped',
            headStyles: {
              fillColor: [15, 23, 42],
              textColor: [255, 255, 255],
              fontSize: 10,
              fontStyle: 'bold'
            },
            bodyStyles: {
              fontSize: 9,
              textColor: [51, 65, 85]
            },
            alternateRowStyles: {
              fillColor: [248, 250, 252]
            },
            columnStyles: {
              0: { cellWidth: 15, halign: 'center' },
              1: { cellWidth: 65 },
              2: { cellWidth: 40 },
              3: { cellWidth: 30, halign: 'center' },
              4: { cellWidth: 30, halign: 'right' }
            },
            margin: { left: 15, right: 15 },
            didDrawPage: function(data) {
              // Footer
              const pageCount = doc.internal.getNumberOfPages();
              doc.setFontSize(8);
              doc.setFont("helvetica", "italic");
              doc.setTextColor(148, 163, 184);
              doc.text(`Prasad Supermarket Ledger Archive - Page ${data.pageNumber} of ${pageCount}`, 15, 287);
              doc.text(`Verified under local trade audit requirements. Digital Lock Secured.`, 115, 287);
            }
          });

          // Add visual stamp/signature block at the bottom on the last page
          const finalY = doc.previousAutoTable.finalY + 15;
          if (finalY < 250) {
            doc.setDrawColor(226, 232, 240);
            doc.line(15, finalY + 10, 80, finalY + 10);
            doc.line(130, finalY + 10, 195, finalY + 10);

            doc.setFontSize(8);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(100, 116, 139);
            doc.text("Warehouse Supervisor Signature", 15, finalY + 15);
            doc.text("Government Inspector / Officer Seal", 130, finalY + 15);

            doc.setTextColor(15, 23, 42);
            doc.setFont("helvetica", "bold");
            doc.text("PRASAD SUPERMARKET", 15, finalY + 5);
            doc.text("APPROVED ARCHIVES DEPT", 130, finalY + 5);
          }

          doc.save(`Prasad_Supermarket_Packing_Report_${selectedArchiveMonth}.pdf`);
          triggerNotification("Official PDF Report generated and downloaded successfully!", "success");
        } catch (error) {
          console.error("PDF generation failed: ", error);
          triggerNotification("Unable to generate PDF inside current frame, export simulation saved.", "error");
        }
      };

      // --- FILTERS & SEARCHES ---
      const filteredRegistryItems = useMemo(() => {
        return items.filter(i => 
          i.name.toLowerCase().includes(searchItemQuery.toLowerCase()) ||
          i.category.toLowerCase().includes(searchItemQuery.toLowerCase())
        );
      }, [items, searchItemQuery]);

      const filteredLedgerItems = useMemo(() => {
        return items.filter(i => 
          i.name.toLowerCase().includes(searchLedgerQuery.toLowerCase()) ||
          i.category.toLowerCase().includes(searchLedgerQuery.toLowerCase())
        );
      }, [items, searchLedgerQuery]);

      // Initialize Lucide icons on DOM update
      useEffect(() => {
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      });

      return (
        <div className="min-h-screen flex flex-col bg-slate-50">
          {/* TOP NOTIFICATION BAR */}
          {notification && (
            <div className={`fixed top-4 right-4 z-50 flex items-center gap-3 px-5 py-3 rounded-xl shadow-lg border transition-all duration-300 transform translate-y-0 ${
              notification.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 
              notification.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-800' :
              'bg-blue-50 border-blue-200 text-blue-800'
            }`}>
              <div className="w-2 h-2 rounded-full animate-ping bg-current" />
              <span className="text-sm font-semibold">{notification.message}</span>
            </div>
          )}

          {/* MAIN NAVIGATION HEADER */}
          <header className="sticky top-0 z-40 bg-slate-900 text-white shadow-md border-b border-slate-800">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-20">
                
                {/* Brand & Identity */}
                <div className="flex items-center space-x-3">
                  <div className="p-2.5 bg-gradient-to-tr from-amber-500 to-amber-600 rounded-xl shadow-inner text-slate-900 font-extrabold flex items-center justify-center">
                    <span className="text-xl tracking-tight">PS</span>
                  </div>
                  <div>
                    <h1 className="text-xl font-extrabold tracking-wide uppercase text-amber-400">Prasad Supermarket</h1>
                    <p className="text-xs text-slate-400 font-medium">Packing Machine Storage & Immutability Ledger</p>
                  </div>
                </div>

                {/* Main Tabs Navigation */}
                <nav className="flex space-x-1 md:space-x-2">
                  <button
                    onClick={() => setActiveTab("ledger")}
                    className={`flex items-center space-x-2 px-3 py-2 md:px-4 md:py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 ${
                      activeTab === "ledger" 
                        ? "bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20" 
                        : "text-slate-300 hover:bg-slate-800 hover:text-white"
                    }`}
                  >
                    <i data-lucide="book-open" className="w-4 h-4"></i>
                    <span>Daily Ledger</span>
                  </button>

                  <button
                    onClick={() => setActiveTab("items")}
                    className={`flex items-center space-x-2 px-3 py-2 md:px-4 md:py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 ${
                      activeTab === "items" 
                        ? "bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20" 
                        : "text-slate-300 hover:bg-slate-800 hover:text-white"
                    }`}
                  >
                    <i data-lucide="package" className="w-4 h-4"></i>
                    <span>Item Registry ({items.length})</span>
                  </button>

                  <button
                    onClick={() => setActiveTab("archives")}
                    className={`flex items-center space-x-2 px-3 py-2 md:px-4 md:py-2.5 rounded-xl text-sm font-semibold transition-all duration-200 ${
                      activeTab === "archives" 
                        ? "bg-amber-500 text-slate-950 shadow-md shadow-amber-500/20" 
                        : "text-slate-300 hover:bg-slate-800 hover:text-white"
                    }`}
                  >
                    <i data-lucide="archive-restore" className="w-4 h-4"></i>
                    <span>Monthly Archives</span>
                  </button>
                </nav>

              </div>
            </div>
          </header>

          {/* MAIN PAGE CONTAINER */}
          <main className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8">
            
            {/* Quick Status Bar */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center space-x-4">
                <div className="p-3 bg-blue-50 text-blue-600 rounded-lg">
                  <i data-lucide="database" className="w-6 h-6"></i>
                </div>
                <div>
                  <div className="text-xs text-slate-500 uppercase font-bold tracking-wider">Item Registry</div>
                  <div className="text-xl font-extrabold text-slate-800">
                    {items.length} <span className="text-xs text-slate-400 font-medium">/ 200 items max</span>
                  </div>
                </div>
              </div>

              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center space-x-4">
                <div className="p-3 bg-emerald-50 text-emerald-600 rounded-lg">
                  <i data-lucide="lock" className="w-6 h-6"></i>
                </div>
                <div>
                  <div className="text-xs text-slate-500 uppercase font-bold tracking-wider">Audit Security</div>
                  <div className="text-sm font-bold text-slate-800 flex items-center gap-1.5 mt-0.5">
